        const output_f=document.getElementById("f");
        const output=document.getElementById("output");

        kbi=ControlWrap.getInstance()

                'cancel':'jump'
            }

'attack':'x',
'jump':'a',
'defend':'b',
'special':'y',

//optional

'command':'rightshoulder',

            'up':'KeyW',
            'down':'KeyS',
            'left':'KeyA',
            'right':'KeyD',

            'attack':'KeyF',
            'jump':'KeyG',
            'defend':['KeyH','KeyB'],

],
3

        /*

        */

        kbi.setAllMapping(2,{
            'up':'Numpad8',
            'down':'Numpad2',
            'left':'Numpad4',
            'right':'Numpad6',
            'attack':'Numpad5',
            'jump':'Numpad1',
            'defend':'Numpad3',
            'special':'Numpad0'
        })


        let f=0;
        
        const dict2Table=(dict)=>{
            let h=`<table>`
                for(let key in dict){
                    if(dict[key] && dict[key].constructor == Object){
                        h+=`<tr>
                            <td>${key}</td>
                            <td>${dict2Table(dict[key])}</td>
                            </tr>`
                    }else{

                        h+=`<tr>
                            <td>${key}</td>
                            <td>${JSON.stringify(dict[key])}</td>
                            </tr>
                            `
                    }
                }
                h+=`</table>`
            return h;
        }
        let lastH='';
        const etf=()=>{
            let h='';

            const all=kbi.flushAll();
            //console.log(all)
            for(let index in all){
                const indexNum=parseInt(index)
                const input=all[indexNum]
                const extra={}
                if(input.source!=ControlType.system){
                    extra['index']=indexNum;
                    extra['name']=kbi.getName(indexNum);
                }
                const nameExtra=input.sourceIndex>0?' - '+(input.sourceIndex+1):''
                if(input.source==ControlType.GAMEPAD){
                    //extra['name']=kbi.getGamepadInfo(index)
                }else if(input.source==ControlType.KEYBOARD){
                    //extra['name']='keyboard '+nameExtra
                }

                //extra['mixed index']=kbi.makeInnerIndex(input.source,input.sourceIndex)
                //extra['name']=input
                
                h+=dict2Table({...extra,...input})
            }

            if(lastH!=h){
                output.innerHTML=h
                lastH=h;
            }
            //output_f.innerHTML=++f
        }
        setInterval(etf,1000/60);

        document.getElementById("btn_listen_controller").addEventListener('click',()=>{
            const index=parseInt(document.getElementById("ip_index").value)
            console.log(index)
            
            kbi.listenKeyFromControllerIndex(index).then((key_name)=>{
                console.log('key_name',key_name)
            }).catch(function(error) {
                console.log('catch',error)
            })
        })
        
        //kbi.allowMainPlayerUseAllController=true;

        document.getElementById("btn_listen_attack").addEventListener('click',()=>{
            kbi.listenControllerIndexFromKeys(['attack','start','cancel']).then((controller_index)=>{
                console.log('controller_index',controller_index)
                kbi.mainControllerIndex=controller_index;
            }).catch(function(error) {
